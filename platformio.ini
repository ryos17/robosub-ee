; PlatformIO Project Configuration File
;
; https://docs.platformio.org/page/projectconf.html
;
; Teensy 4.1 breakout firmware (gen2/teensy_firmware).
;
; The firmware stays in Arduino .ino sketches so they can also be opened and
; uploaded from the Arduino IDE.  PlatformIO's .ino converter only works when
; the sketch sits at the root of src_dir, so src_dir points straight at ONE
; sketch folder and the VSCode "Upload" button flashes that sketch.
;
; To flash a different sketch, change src_dir to one of:
;   gen2/teensy_firmware/STABLE_firmware    (competition build)
;   gen2/teensy_firmware/DEV_firmware       (work in progress)
;   gen2/teensy_firmware/PREQUAL_firmware   (prequal run)
;
; Build:  pio run
; Upload: pio run -t upload
;
; After upload starts, press the button on the Teensy if it doesn't reboot
; into the bootloader on its own.

[platformio]
src_dir = gen2/teensy_firmware/STABLE_firmware

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino
upload_protocol = teensy-cli
; first write after the soft reboot races the ~2.3s USB enumeration on the
; Jetson's onboard hub; if it fails, immediately run the loader once more
upload_command = $UPLOADER $UPLOADERFLAGS $SOURCES || $UPLOADER $UPLOADERFLAGS $SOURCES
monitor_speed = 9600
lib_deps =
    bluerobotics/BlueRobotics MS5837 Library
    adafruit/Adafruit MCP9808 Library
    adafruit/Adafruit BME280 Library
    adafruit/Adafruit Unified Sensor
